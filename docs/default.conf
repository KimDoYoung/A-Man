server {
    listen 80;
    # IP와 도메인 모두 응답하도록 설정
    server_name localhost 192.168.0.100 jskn.iptime.org;

    # 쿠키 및 요청 헤더 대용량 허용 (HTTP 494 에러 방지)
    client_header_buffer_size 8k;
    large_client_header_buffers 4 32k;

    # Certbot path
    location /.well-known/acme-challenge/ {
	    root /var/www/certbot;
    }

    # --- sophia image view 설정 추가 ---
    # --- tomcat 설정 추가 ---
    # 루트 경로(/) 접속 시 Tomcat의 ROOT로 연결
    location / {
        proxy_pass http://jskn_tomcat:8080/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # index 파일 명시 (일반적으로 Tomcat이 처리하지만 명시 가능)
        index index.html index.htm;
    }    
    location /sofia/ {
        proxy_pass http://jskn_tomcat:8080/sofia/;
	proxy_set_header   Host              $host;
	proxy_set_header   X-Real-IP         $remote_addr;
	proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
	proxy_set_header   X-Forwarded-Proto $scheme;
	client_max_body_size 50M;
	proxy_read_timeout   120s;
    } 
    location /pcms/ {
        proxy_pass http://jskn_tomcat:8080/pcms/;
	proxy_set_header   Host              $host;
	proxy_set_header   X-Real-IP         $remote_addr;
	proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
	proxy_set_header   X-Forwarded-Proto $scheme;
	client_max_body_size 50M;
	proxy_read_timeout   120s;
    } 
    location /kalpadb-api/ {
        proxy_pass http://jskn_tomcat:8080/kalpadb-api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;
    }
    location /editor/images/ {
	    #root /data/docker/apps/kalpadb-api2/uploads/editor-images
	alias /var/www/uploads/editor/images/;
        
        # 보안 및 성능 설정
        autoindex off;          # 폴더 내부 리스트 노출 방지
        access_log off;         # 이미지 요청은 로그 제외 (디스크 I/O 절약)
        expires 30d;            # 브라우저 캐싱 활성화
        add_header Cache-Control "public, no-transform";
        
        # 파일이 없을 경우 처리
        try_files $uri =404;
    }    
    # 1. aview 서비스 설정
    location /aview/ {
        # 컨테이너 이름(jskn_aview)과 내부 포트(8080)를 사용
        proxy_pass http://jskn_aview:8080/aview/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 문서 변환/업로드를 위해 제한 용량 상향
        client_max_body_size 100M;
    }

    # 2. aman 서비스 설정
    location /aman {
        proxy_pass http://jskn_aman:8080/aman;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 50M;
        proxy_read_timeout 120s;
    }

  # --- kiwi8 설정 추가 ---
  location /kiwi8/ {
      proxy_pass http://jskn_kiwi8:8003/kiwi8/;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
  }


    # 에러 페이지 설정 (선택 사항)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
