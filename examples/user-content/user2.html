<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 지식 창고 (Public Docs)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <header class="sticky top-0 z-50 flex items-center justify-between bg-white border-b border-gray-200 px-6 py-3 shadow-xs">
        <div class="flex items-center space-x-3">
            <i data-lucide="book-open" class="w-6 h-6 text-indigo-600"></i>
            <span class="text-lg font-bold tracking-tight">AssetERP <span class="text-indigo-600">Docs</span></span>
        </div>
        <div class="flex items-center space-x-4 text-sm text-gray-500">
            <span class="bg-green-100 text-green-800 text-xs font-medium px-2.5 py-0.5 rounded-sm">Public API Zone</span>
        </div>
    </header>

    <div class="flex min-h-[calc(100vh-53px)]">

        <aside class="w-68 bg-white border-r border-gray-200 p-4 shrink-0 hidden md:block flex flex-col">
            
            <div class="mb-4 sticky top-[69px] bg-white pb-2">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">메뉴 내비게이션</p>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-2.5 pointer-events-none text-gray-400">
                        <i data-lucide="filter" class="w-3.5 h-3.5"></i>
                    </span>
                    <input type="text" 
                           placeholder="메뉴/폴더 필터링..." 
                           class="w-full pl-8 pr-3 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded-md focus:outline-hidden focus:bg-white focus:border-indigo-500 transition-colors">
                </div>
            </div>
            
            <ul class="space-y-4 overflow-y-auto flex-1">
                <li>
                    <div class="flex items-center text-sm font-semibold text-gray-800 cursor-pointer hover:text-indigo-600">
                        <i data-lucide="folder" class="w-4 h-4 mr-2 text-indigo-500"></i>
                        <span>1. 시스템 설정</span>
                    </div>
                    <ul class="mt-1.5 ml-4 border-l border-gray-200 pl-3 space-y-2">
                        <li>
                            <div class="text-xs font-medium text-gray-600 cursor-pointer hover:text-indigo-600 flex items-center">
                                <i data-lucide="folder-open" class="w-3.5 h-3.5 mr-1.5 text-amber-500"></i>
                                <span>1.1 권한 및 보안</span>
                            </div>
                            <ul class="mt-1 ml-4 space-y-1 text-xs text-gray-500">
                                <li><a href="#" class="block py-1 px-2 rounded-sm bg-indigo-50 text-indigo-700 font-medium flex items-center"><i data-lucide="file-text" class="w-3 h-3 mr-1"></i>사용자 관리</a></li>
                                <li><a href="#" class="block py-1 px-2 rounded-sm hover:bg-gray-100 flex items-center"><i data-lucide="file-text" class="w-3 h-3 mr-1"></i>메뉴 권한 설정</a></li>
                                <li><a href="#" class="block py-1 px-2 rounded-sm hover:bg-gray-100 flex items-center"><i data-lucide="file-text" class="w-3 h-3 mr-1"></i>접근 제어 정책</a></li>
                            </ul>
                        </li>
                    </ul>
                </li>
                <li>
                    <div class="flex items-center text-sm font-semibold text-gray-800 cursor-pointer hover:text-indigo-600">
                        <i data-lucide="folder" class="w-4 h-4 mr-2 text-indigo-500"></i>
                        <span>2. 인사/급여 관리</span>
                    </div>
                </li>
            </ul>
        </aside>

        <main class="flex-1 bg-white p-8 lg:px-12">
            <nav class="flex text-xs text-gray-500 mb-6 space-x-2 items-center">
                <span>시스템 설정</span>
                <i data-lucide="chevron-right" class="w-3 h-3"></i>
                <span>권한 및 보안</span>
                <i data-lucide="chevron-right" class="w-3 h-3"></i>
                <span class="text-gray-800 font-medium">사용자 관리</span>
            </nav>

            <article class="prose max-w-3xl">
                <h1 class="text-3xl font-bold tracking-tight text-gray-900 pb-4 border-b border-gray-200 mb-6">사용자 관리</h1>
                <p class="text-gray-600 leading-relaxed mb-4">
                    시스템에 접근하는 모든 사원의 계정을 생성, 수정하고 상태를 관리하는 화면입니다.
                </p>
            </article>
        </main>

        <aside class="w-48 p-6 shrink-0 hidden lg:block border-l border-gray-100">
            <div class="sticky top-20">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">이 페이지의 목차</p>
                <ul class="space-y-2 text-xs text-gray-500 border-l-2 border-gray-200 pl-3">
                    <li><a href="#" class="block text-indigo-600 font-medium hover:text-indigo-600">1. 주요 기능 안내</a></li>
                </ul>
            </div>
        </aside>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
