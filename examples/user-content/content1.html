<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetERP 어드민 가이드 문서 관리 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #e2e8f0; border-radius: 2px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased select-none"
      x-data="{ 
          isLoggedIn: true, 
          currentTab: 'edit',
          selectedPageTitle: '사용자 관리',
          selectedPageContent: '## 사용자 관리 지침서\n\n시스템에 접근하는 모든 사원의 계정을 관리하는 화면입니다.\n\n### 1. 주요 기능\n- 사원 권한 부여\n- 계정 비활성화 및 제어',
          expandedFolders: { '1': true, '1.1': true, '2': false, '3': false }
      }">

    <div x-show="!isLoggedIn" x-cloak class="fixed inset-0 z-[100] bg-gray-900 flex flex-col items-center justify-center text-white">
        <div class="bg-white text-gray-900 p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <i data-lucide="lock" class="w-12 h-12 text-indigo-600 mx-auto mb-4"></i>
            <h2 class="text-xl font-bold mb-2">관리자 인증이 필요합니다</h2>
            <p class="text-sm text-gray-500 mb-6">/admin 서비스 접근을 위해 로그인을 진행해 주세요.</p>
            <button @click="isLoggedIn = true" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md font-semibold text-sm transition-colors cursor-pointer">
                테스트 계정으로 가상 로그인 (/login)
            </button>
        </div>
    </div>

    <div x-show="isLoggedIn" class="flex flex-col min-h-screen">

        <header class="h-14 bg-gray-900 text-white px-6 flex items-center justify-between border-b border-gray-800 shrink-0">
            <div class="flex items-center space-x-2">
                <span class="text-sm font-semibold tracking-wider px-2 py-0.5 bg-indigo-600 rounded text-indigo-50">A-Man version</span>
                <span class="text-xs text-gray-400">| Admin Workspace</span>
            </div>
            
            <div class="flex items-center space-x-4 text-sm">
                <div class="flex items-center space-x-1.5 text-gray-300">
                    <i data-lucide="user-check" class="w-4 h-4 text-emerald-400"></i>
                    <span class="font-medium">최고관리자 (admin)</span>
                </div>
                <button @click="isLoggedIn = false" class="text-xs bg-gray-800 hover:bg-gray-700 hover:text-red-400 text-gray-400 px-3 py-1.5 rounded-md transition-colors flex items-center space-x-1 cursor-pointer">
                    <i data-lucide="log-out" class="w-3 h-3"></i>
                    <span>로그아웃</span>
                </button>
            </div>
        </header>

        <div class="flex flex-1 items-stretch">
            
            <aside class="w-[30%] min-w-[240px] max-w-[380px] bg-white border-r border-gray-200 p-4 flex flex-col shrink-0">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">메뉴 계층 구조 (Level 1~3)</p>
                
                <ul class="space-y-2 overflow-y-auto flex-1 text-xs text-gray-700 custom-scroll pr-1">
                    <li>
                        <div @click="expandedFolders['1'] = !expandedFolders['1']" class="flex items-center justify-between p-1 rounded-sm hover:bg-gray-50 cursor-pointer font-semibold text-gray-900">
                            <div class="flex items-center"><i data-lucide="folder" class="w-3.5 h-3.5 mr-1.5 text-indigo-500"></i><span>1. 시스템 설정</span></div>
                            <i data-lucide="chevron-down" class="w-3 h-3 text-gray-400 transition-transform" :class="expandedFolders['1'] ? '' : '-rotate-90'"></i>
                        </div>
                        <ul class="mt-1 ml-3 border-l border-gray-100 pl-2.5 space-y-2" x-show="expandedFolders['1']">
                            <li>
                                <div @click.stop="expandedFolders['1.1'] = !expandedFolders['1.1']" class="font-medium text-gray-600 flex items-center justify-between cursor-pointer py-0.5">
                                    <div class="flex items-center"><i data-lucide="folder-open" class="w-3 h-3 mr-1.5 text-amber-500"></i><span>1.1 권한 및 보안</span></div>
                                    <i data-lucide="chevron-down" class="w-2.5 h-2.5 text-gray-400" :class="expandedFolders['1.1'] ? '' : '-rotate-90'"></i>
                                </div>
                                <ul class="mt-1 ml-3 space-y-1 text-gray-500" x-show="expandedFolders['1.1']">
                                    <li>
                                        <button @click="selectedPageTitle = '1.1.1 사용자 관리'; selectedPageContent = '## 사용자 관리 가이드\n\n이곳은 Tiptap을 시뮬레이션한 편집 영역입니다.'" 
                                                class="w-full text-left py-1 px-2 rounded-sm font-medium transition-colors"
                                                :class="selectedPageTitle.includes('사용자 관리') ? 'bg-indigo-50 text-indigo-700' : 'hover:bg-gray-50'">
                                            1.1.1 사용자 관리
                                        </button>
                                    </li>
                                    <li>
                                        <button @click="selectedPageTitle = '1.1.2 메뉴 권한 설정'; selectedPageContent = '## 메뉴 권한 설정\n\n역할에 부합하는 ERP 메뉴 가시성을 통제합니다.'" 
                                                class="w-full text-left py-1 px-2 rounded-sm font-medium transition-colors"
                                                :class="selectedPageTitle.includes('메뉴 권한 설정') ? 'bg-indigo-50 text-indigo-700' : 'hover:bg-gray-50'">
                                            1.1.2 메뉴 권한 설정
                                        </button>
                                    </li>
                                </ul>
                            </li>
                        </ul>
                    </li>
                    
                    <li>
                        <div @click="expandedFolders['2'] = !expandedFolders['2']" class="flex items-center justify-between p-1 rounded-sm hover:bg-gray-50 cursor-pointer font-semibold text-gray-900">
                            <div class="flex items-center"><i data-lucide="folder" class="w-3.5 h-3.5 mr-1.5 text-indigo-500"></i><span>2. 인사/급여 관리</span></div>
                            <i data-lucide="chevron-down" class="w-3 h-3 text-gray-400 transition-transform" :class="expandedFolders['2'] ? '' : '-rotate-90'"></i>
                        </div>
                    </li>
                </ul>
            </aside>

            <main class="flex-1 bg-white p-6 flex flex-col overflow-hidden">
                <div class="mb-4 flex items-center justify-between border-b border-gray-200 pb-3">
                    <div>
                        <span class="text-xs text-indigo-600 font-semibold uppercase tracking-wider">Active Document</span>
                        <h1 class="text-xl font-bold text-gray-900" x-text="selectedPageTitle"></h1>
                    </div>
                    
                    <div class="flex bg-gray-100 p-1 rounded-lg text-xs font-medium">
                        <button @click="currentTab = 'edit'" 
                                class="px-4 py-1.5 rounded-md transition-all cursor-pointer flex items-center space-x-1"
                                :class="currentTab === 'edit' ? 'bg-white text-gray-900 shadow-xs font-semibold' : 'text-gray-500 hover:text-gray-900'">
                            <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>
                            <span>1번탭 편집 (Tiptap)</span>
                        </button>
                        <button @click="currentTab = 'view'" 
                                class="px-4 py-1.5 rounded-md transition-all cursor-pointer flex items-center space-x-1"
                                :class="currentTab === 'view' ? 'bg-white text-gray-900 shadow-xs font-semibold' : 'text-gray-500 hover:text-gray-900'">
                            <i data-lucide="eye" class="w-3.5 h-3.5"></i>
                            <span>2번탭 보기</span>
                        </button>
                    </div>
                </div>

                <div class="flex-1 flex flex-col overflow-hidden">
                    
                    <div x-show="currentTab === 'edit'" class="flex-1 flex flex-col border border-gray-200 rounded-lg overflow-hidden bg-gray-50" x-cloak>
                        <div class="bg-white border-b border-gray-200 px-4 py-2 flex items-center space-x-2 text-gray-500 overflow-x-auto shrink-0 select-none">
                            <button class="p-1 hover:bg-gray-100 rounded text-gray-800 font-bold text-xs px-1.5">H1</button>
                            <button class="p-1 hover:bg-gray-100 rounded text-gray-800 font-bold text-xs px-1.5">H2</button>
                            <span class="w-px h-4 bg-gray-200"></span>
                            <button class="p-1 hover:bg-gray-100 rounded" title="굵게"><i data-lucide="bold" class="w-3.5 h-3.5"></i></button>
                            <button class="p-1 hover:bg-gray-100 rounded" title="기울임"><i data-lucide="italic" class="w-3.5 h-3.5"></i></button>
                            <button class="p-1 hover:bg-gray-100 rounded" title="인용구"><i data-lucide="quote" class="w-3.5 h-3.5"></i></button>
                            <button class="p-1 hover:bg-gray-100 rounded" title="코드 블록"><i data-lucide="code" class="w-3.5 h-3.5"></i></button>
                            <span class="w-px h-4 bg-gray-200"></span>
                            <button class="p-1 hover:bg-gray-100 rounded text-indigo-600 flex items-center space-x-1 text-xs px-1.5 bg-indigo-50" title="이미지 서버 업로드 (/content/image)">
                                <i data-lucide="image" class="w-3.5 h-3.5"></i>
                                <span class="font-medium">이미지 삽입</span>
                            </button>
                        </div>
                        <textarea class="flex-1 p-4 font-mono text-sm bg-white resize-none focus:outline-hidden leading-relaxed"
                                  x-model="selectedPageContent"
                                  placeholder="마크다운 양식 문서를 편집하세요..."></textarea>
                        
                        <div class="bg-white border-t border-gray-200 px-4 py-2.5 flex justify-end space-x-2 shrink-0">
                            <button class="px-4 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md text-xs font-medium cursor-pointer">취소</button>
                            <button @click="alert('POST /content 를 통한 데이터 Upsert 트랜잭션이 성공적으로 처리되었습니다.');" 
                                    class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md text-xs font-semibold shadow-xs flex items-center space-x-1 cursor-pointer">
                                <i data-lucide="save" class="w-3.5 h-3.5"></i>
                                <span>저장하기 (Upsert)</span>
                            </button>
                        </div>
                    </div>

                    <div x-show="currentTab === 'view'" class="flex-1 border border-gray-200 rounded-lg p-6 overflow-y-auto bg-gray-50 text-sm custom-scroll" x-cloak>
                        <div class="prose max-w-none bg-white p-6 border border-gray-100 rounded-md shadow-xs">
                            <div class="mb-4 text-xs font-semibold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-sm inline-flex items-center space-x-1">
                                <i data-lucide="check-circle" class="w-3 h-3"></i>
                                <span>실시간 프리뷰 모드 렌더링</span>
                            </div>
                            <h2 class="text-xl font-bold mb-3 border-b border-gray-100 pb-1 text-gray-800" x-text="selectedPageTitle"></h2>
                            <pre class="bg-gray-900 text-gray-100 p-4 rounded-md font-mono text-xs overflow-x-auto whitespace-pre-wrap leading-relaxed" x-text="selectedPageContent"></pre>
                        </div>
                    </div>

                </div>
            </main>

        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
