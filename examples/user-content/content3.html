<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetERP 어드민 가이드 문서 관리 시스템 (분할 뷰)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #e2e8f0; border-radius: 2px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased select-none"
      x-data="{ 
          sidebarOpen: true, 
          selectedPageTitle: '1.1.1 사용자 관리',
          selectedPageContent: '## 사용자 관리 가이드\n\n이곳은 Tiptap을 시뮬레이션한 편집 영역입니다.\n\n- 실시간 분할 편집 뷰 모드 활성화\n- 왼쪽에서 편집하고 오른쪽에서 바로 확인하세요.',
          previewContent: '## 사용자 관리 가이드\n\n이곳은 Tiptap을 시뮬레이션한 편집 영역입니다.\n\n- 실시간 분할 편집 뷰 모드 활성화\n- 왼쪽에서 편집하고 오른쪽에서 바로 확인하세요.',
          expandedFolders: { '1': true, '1.1': true, '2': false, '3': false },
          contextMenu: { open: false, x: 0, y: 0, targetId: null }
      }"
      @click="contextMenu.open = false"
      @contextmenu="contextMenu.open = false">

    <header class="h-14 bg-gray-900 text-white px-6 flex items-center justify-between border-b border-gray-800 shrink-0">
        <div class="flex items-center space-x-3">
            <button @click="sidebarOpen = !sidebarOpen" class="p-1.5 rounded-md hover:bg-gray-800 text-gray-400 transition-colors cursor-pointer" title="메뉴 영역 토글">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center space-x-2">
                <span class="text-sm font-semibold tracking-wider px-2 py-0.5 bg-indigo-600 rounded text-indigo-50">A-Man version</span>
                <span class="text-xs text-gray-400">| Split View Editor</span>
            </div>
        </div>
        <div class="flex items-center space-x-4 text-sm">
            <div class="flex items-center space-x-1.5 text-gray-300">
                <i data-lucide="user-check" class="w-4 h-4 text-emerald-400"></i>
                <span class="font-medium">최고관리자 (admin)</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 h-[calc(100vh-56px)] items-stretch">
        
        <aside class="w-[25%] min-w-[240px] max-w-[340px] bg-white border-r border-gray-200 p-4 flex flex-col shrink-0 transition-all duration-200"
               x-show="sidebarOpen" x-cloak>
            <div class="mb-3 sticky top-0 bg-white pb-2 border-b border-gray-100">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">메뉴 네비게이션</p>
                <div class="flex items-center space-x-1.5">
                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-2.5 pointer-events-none text-gray-400">
                            <i data-lucide="filter" class="w-3.5 h-3.5"></i>
                        </span>
                        <input type="text" placeholder="메뉴 필터링..." class="w-full pl-8 pr-3 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded-md focus:outline-hidden focus:bg-white focus:border-indigo-500 transition-colors">
                    </div>
                    <button @click="expandedFolders = { '1': true, '1.1': true, '2': true, '3': true }" class="p-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-md text-gray-500 cursor-pointer"><i data-lucide="folder-open" class="w-3.5 h-3.5"></i></button>
                    <button @click="expandedFolders = { '1': false, '1.1': false, '2': false, '3': false }" class="p-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-md text-gray-500 cursor-pointer"><i data-lucide="folder" class="w-3.5 h-3.5"></i></button>
                </div>
            </div>
            
            <ul class="space-y-2.5 overflow-y-auto flex-1 text-xs text-gray-700 whitespace-nowrap custom-scroll pr-1">
                <li>
                    <div @click="expandedFolders['1'] = !expandedFolders['1']" @contextmenu.prevent="contextMenu.open = true; contextMenu.x = $event.clientX; contextMenu.y = $event.clientY; contextMenu.targetId = 'sys_folder';" class="flex items-center justify-between p-1 rounded-sm hover:bg-gray-50 cursor-pointer font-semibold text-gray-900">
                        <div class="flex items-center"><i data-lucide="folder" class="w-3.5 h-3.5 mr-1.5 text-indigo-500"></i><span>1. 시스템 설정</span></div>
                        <i data-lucide="chevron-down" class="w-3 h-3 text-gray-400 transition-transform" :class="expandedFolders['1'] ? '' : '-rotate-90'"></i>
                    </div>
                    <ul class="mt-1 ml-3 border-l border-gray-100 pl-2.5 space-y-2" x-show="expandedFolders['1']">
                        <li>
                            <div @click.stop="expandedFolders['1.1'] = !expandedFolders['1.1']" @contextmenu.prevent.stop="contextMenu.open = true; contextMenu.x = $event.clientX; contextMenu.y = $event.clientY; contextMenu.targetId = 'security_folder';" class="font-medium text-gray-600 flex items-center justify-between cursor-pointer py-0.5">
                                <div class="flex items-center"><i data-lucide="folder-open" class="w-3 h-3 mr-1.5 text-amber-500"></i><span>1.1 권한 및 보안</span></div>
                                <i data-lucide="chevron-down" class="w-2.5 h-2.5 text-gray-400" :class="expandedFolders['1.1'] ? '' : '-rotate-90'"></i>
                            </div>
                            <ul class="mt-1 ml-3 space-y-1 text-gray-500" x-show="expandedFolders['1.1']">
                                <li>
                                    <button @click="selectedPageTitle = '1.1.1 사용자 관리'; selectedPageContent = '## 사용자 관리 가이드\n\n내용이 수정되었습니다.'; previewContent = '## 사용자 관리 가이드\n\n내용이 수정되었습니다.';" @contextmenu.prevent.stop="contextMenu.open = true; contextMenu.x = $event.clientX; contextMenu.y = $event.clientY; contextMenu.targetId = 'page_1_1_1';" class="w-full text-left py-1 px-2 rounded-sm font-medium transition-colors cursor-pointer" :class="selectedPageTitle.includes('사용자 관리') ? 'bg-indigo-50 text-indigo-700' : 'hover:bg-gray-50'">1.1.1 사용자 관리</button>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </li>
            </ul>
        </aside>

        <main class="flex-1 bg-white p-6 flex flex-col overflow-hidden">
            
            <nav class="flex items-center space-x-2 text-[11px] text-gray-400 font-medium mb-2.5 select-none shrink-0">
                <div class="flex items-center space-x-1 hover:text-gray-600 cursor-pointer transition-colors">
                    <i data-lucide="layers" class="w-3.5 h-3.5 text-gray-300"></i>
                    <span>시스템 설정</span>
                </div>
                <i data-lucide="chevron-right" class="w-3 h-3 text-gray-300"></i>
                <div class="hover:text-gray-600 cursor-pointer transition-colors">
                    <span>권한 및 보안</span>
                </div>
                <i data-lucide="chevron-right" class="w-3 h-3 text-gray-300"></i>
                <div class="text-indigo-600 font-semibold flex items-center space-x-1">
                    <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                    <span x-text="selectedPageTitle">1.1.1 사용자 관리</span>
                </div>
            </nav>

            <div class="mb-4 shrink-0 flex items-center justify-between">
                <div>
                    <span class="text-xs text-indigo-600 font-semibold uppercase tracking-wider">Workspace Mode</span>
                    <h1 class="text-xl font-bold text-gray-900" x-text="selectedPageTitle"></h1>
                </div>
                <div class="text-[11px] text-emerald-600 bg-emerald-50 border border-emerald-200 rounded px-2.5 py-1 flex items-center space-x-1">
                    <i data-lucide="refresh-cw" class="w-3 h-3 animate-spin" style="animation-duration: 3s;"></i>
                    <span>실시간 스플릿 뷰 활성화</span>
                </div>
            </div>

            <div class="flex-1 flex border border-gray-200 rounded-lg overflow-hidden bg-gray-100 items-stretch">
                
                <div class="w-1/2 bg-white flex flex-col border-r border-gray-200">
                    <div class="bg-gray-50 border-b border-gray-200 px-4 py-2 flex items-center justify-between text-gray-500 shrink-0">
                        <div class="flex items-center space-x-2">
                            <button class="p-1 hover:bg-gray-200 rounded text-gray-800 font-bold text-xs px-1">H1</button>
                            <button class="p-1 hover:bg-gray-200 rounded text-gray-800 font-bold text-xs px-1">H2</button>
                            <span class="w-px h-3.5 bg-gray-300"></span>
                            <button class="p-1 hover:bg-gray-200 rounded" title="굵게"><i data-lucide="bold" class="w-3.5 h-3.5"></i></button>
                            <button class="p-1 hover:bg-gray-200 rounded" title="코드"><i data-lucide="code" class="w-3.5 h-3.5"></i></button>
                        </div>
                        <span class="text-[10px] font-mono text-gray-400 bg-gray-200 px-1.5 py-0.5 rounded">EDITOR</span>
                    </div>
                    
                    <textarea class="flex-1 p-4 font-mono text-xs resize-none focus:outline-hidden leading-relaxed bg-white custom-scroll" 
                              x-model="selectedPageContent"
                              @input="previewContent = selectedPageContent"
                              placeholder="이곳에 마크다운 문서를 편집하면 우측에 즉시 반영됩니다..."></textarea>
                </div>

                <div class="w-1/2 bg-slate-50 flex flex-col">
                    <div class="bg-slate-100 border-b border-gray-200 px-4 py-2 flex items-center justify-between text-gray-500 shrink-0">
                        <span class="text-[10px] font-mono text-indigo-600 bg-indigo-50 border border-indigo-100 px-1.5 py-0.5 rounded font-bold tracking-wider">LIVE PREVIEW</span>
                    </div>
                    <div class="flex-1 p-5 overflow-y-auto custom-scroll bg-slate-50/50">
                        <div class="prose max-w-none bg-white p-5 border border-gray-100 rounded-md shadow-xs font-mono text-xs whitespace-pre-wrap leading-relaxed min-h-full" 
                             x-text="previewContent"></div>
                    </div>
                </div>

            </div>

            <div class="mt-3 flex justify-end shrink-0">
                <button @click="previewContent = selectedPageContent; alert('POST /content DB 업서트 및 최종 뷰어 동기화가 완료되었습니다.');" 
                        class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md text-xs font-semibold shadow-xs flex items-center space-x-1.5 cursor-pointer">
                    <i data-lucide="save" class="w-3.5 h-3.5"></i>
                    <span>변경사항 저장하기 (Upsert)</span>
                </button>
            </div>
        </main>
    </div>

    <div x-show="contextMenu.open" x-cloak x-transition.opacity class="absolute z-[100] w-40 bg-white border border-gray-200 rounded-lg shadow-xl py-1 text-xs text-gray-700 font-medium" :style="'left: ' + contextMenu.x + 'px; top: ' + contextMenu.y + 'px;'">
        <button @click="alert(contextMenu.targetId + ' 항목 아래에 메뉴를 추가합니다.');" class="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center space-x-2 cursor-pointer"><i data-lucide="chevron-down-square" class="w-3.5 h-3.5 text-gray-400"></i><span>아래에 메뉴 추가</span></button>
        <button @click="alert(contextMenu.targetId + ' 항목 위에 메뉴를 추가합니다.');" class="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center space-x-2 cursor-pointer"><i data-lucide="chevron-up-square" class="w-3.5 h-3.5 text-gray-400"></i><span>위에 메뉴 추가</span></button>
        <div class="border-t border-gray-100 my-1"></div>
        <button @click="alert('이름 바꾸기 팝업 활성화');" class="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center space-x-2 cursor-pointer"><i data-lucide="edit-2" class="w-3.5 h-3.5 text-gray-400"></i><span>이름 바꾸기</span></button>
        <button @click="alert('정말 삭제하시겠습니까?');" class="w-full text-left px-3 py-1.5 hover:bg-red-50 hover:text-red-600 flex items-center space-x-2 text-red-500 cursor-pointer"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i><span>삭제</span></button>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
