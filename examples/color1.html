<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Color Palette Generator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #121212;
      color: #ffffff;
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .btn-generate {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }

    .btn-generate:hover {
      opacity: 0.9;
    }

    .btn-generate:active {
      transform: scale(0.96);
    }

    .palette-container {
      display: flex;
      flex: 1;
      width: 100%;
    }

    .color-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 3rem 1rem;
      transition: flex 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
    }

    .color-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .color-hex {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.15);
      transition: background 0.2s ease;
    }

    .color-hex:hover {
      background: rgba(0, 0, 0, 0.3);
    }

    .btn-lock {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: currentColor;
      padding: 0.5rem;
      border-radius: 50%;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      backdrop-filter: blur(4px);
      transition: background 0.2s ease;
    }

    .btn-lock:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #ffffff;
      color: #000000;
      padding: 0.75rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.875rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .palette-container {
        flex-direction: column;
      }
      .color-card {
        flex-direction: row;
        padding: 1rem 2rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Color Palette</h1>
    <button class="btn-generate" id="generateBtn">새로고침 (Space)</button>
  </header>

  <main class="palette-container" id="paletteContainer"></main>

  <div class="toast" id="toast">클립보드에 복사되었습니다!</div>

  <script>
    const COLOR_COUNT = 5;
    const paletteContainer = document.getElementById('paletteContainer');
    const generateBtn = document.getElementById('generateBtn');
    const toast = document.getElementById('toast');

    // 팔레트 상태 관리
    let colors = Array.from({ length: COLOR_COUNT }, () => ({
      hex: getRandomHex(),
      locked: false
    }));

    // 랜덤 Hex 색상 생성
    function getRandomHex() {
      const letters = '0123456789ABCDEF';
      let color = '#';
      for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
      }
      return color;
    }

    // 배경색에 따른 텍스트 가독성 계산 (YIQ 계산식)
    function getContrastColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const yiq = (r * 299 + g * 587 + b * 114) / 1000;
      return yiq >= 128 ? '#000000' : '#FFFFFF';
    }

    // 팔레트 재생성
    function generatePalette() {
      colors = colors.map(color => {
        if (color.locked) return color;
        return { ...color, hex: getRandomHex() };
      });
      render();
    }

    // Lock 상태 토글
    function toggleLock(index) {
      colors[index].locked = !colors[index].locked;
      render();
    }

    // 클립보드 복사 및 알림
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        toast.textContent = `${text} 복사되었습니다!`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
      });
    }

    // 화면 UI 그려주기
    function render() {
      paletteContainer.innerHTML = '';

      colors.forEach((colorObj, index) => {
        const textColor = getContrastColor(colorObj.hex);
        
        const card = document.createElement('div');
        card.className = 'color-card';
        card.style.backgroundColor = colorObj.hex;
        card.style.color = textColor;

        card.innerHTML = `
          <button class="btn-lock" style="color: ${textColor}">
            ${colorObj.locked ? '🔒' : '🔓'}
          </button>
          <div class="color-info">
            <span class="color-hex">${colorObj.hex}</span>
          </div>
        `;

        // 이벤트를 JS 상에서 바인딩 (안전성 강화)
        card.querySelector('.btn-lock').addEventListener('click', (e) => {
          e.stopPropagation();
          toggleLock(index);
        });

        card.querySelector('.color-hex').addEventListener('click', () => {
          copyToClipboard(colorObj.hex);
        });

        paletteContainer.appendChild(card);
      });
    }

    // Event Listeners
    generateBtn.addEventListener('click', generatePalette);

    // 스페이스바를 눌렀을 때 생성 기능
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        generatePalette();
      }
    });

    // 초기 실행
    render();
  </script>
</body>
</html>
