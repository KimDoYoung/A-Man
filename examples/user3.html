<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 지식 창고 (Public Docs)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased select-none" 
      x-data="{ 
          sidebarOpen: true, 
          tocOpen: true, 
          folder1Open: true, 
          sidebarWidth: 260, 
          isResizing: false 
      }"
      @mousemove.window="if (isResizing) sidebarWidth = Math.max(180, Math.min($event.clientX, 500))"
      @mouseup.window="isResizing = false">

    <header class="sticky top-0 z-50 flex items-center justify-between bg-white border-b border-gray-200 px-6 py-3 shadow-xs">
        <div class="flex items-center space-x-3">
            <button @click="sidebarOpen = !sidebarOpen" class="p-1.5 rounded-md hover:bg-gray-100 text-gray-500 transition-colors">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center space-x-2">
                <i data-lucide="book-open" class="w-5 h-5 text-indigo-600"></i>
                <span class="text-base font-bold tracking-tight">AssetERP <span class="text-indigo-600">Docs</span></span>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <span class="bg-green-100 text-green-800 text-xs font-medium px-2.5 py-0.5 rounded-sm">Public API Zone</span>
            <button @click="tocOpen = !tocOpen" class="p-1.5 rounded-md hover:bg-gray-100 text-gray-500 transition-colors">
                <i data-lucide="layout-sidebar-right" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <div class="flex min-h-[calc(100vh-53px)] items-stretch">

        <aside class="bg-white p-4 shrink-0 flex flex-col overflow-hidden"
               x-show="sidebarOpen" 
               x-cloak
               :style="'width: ' + sidebarWidth + 'px;'">
            
            <div class="mb-4 sticky top-[69px] bg-white pb-2">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">메뉴 내비게이션</p>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-2.5 pointer-events-none text-gray-400">
                        <i data-lucide="filter" class="w-3.5 h-3.5"></i>
                    </span>
                    <input type="text" placeholder="필터링..." class="w-full pl-8 pr-3 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded-md focus:outline-hidden focus:bg-white focus:border-indigo-500 transition-colors">
                </div>
            </div>
            
            <ul class="space-y-3 overflow-y-auto flex-1 text-sm whitespace-nowrap">
                <li>
                    <div @click="folder1Open = !folder1Open" class="flex items-center justify-between p-1 rounded-md hover:bg-gray-50 cursor-pointer text-gray-800 font-semibold">
                        <div class="flex items-center">
                            <i data-lucide="folder" class="w-4 h-4 mr-2 text-indigo-500"></i>
                            <span>1. 시스템 설정</span>
                        </div>
                        <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-gray-400 transition-transform duration-200" :class="folder1Open ? '' : '-rotate-90'"></i>
                    </div>

                    <ul class="mt-1 ml-4 border-l border-gray-200 pl-3 space-y-2" x-show="folder1Open">
                        <li>
                            <div class="text-xs font-medium text-gray-600 flex items-center py-0.5">
                                <i data-lucide="folder-open" class="w-3.5 h-3.5 mr-1.5 text-amber-500"></i>
                                <span>1.1 권한 및 보안</span>
                            </div>
                            <ul class="mt-1 ml-4 space-y-1 text-xs text-gray-500">
                                <li><a href="#" class="block py-1 px-2 rounded-sm bg-indigo-50 text-indigo-700 font-medium flex items-center"><i data-lucide="file-text" class="w-3 h-3 mr-1"></i>사용자 관리</a></li>
                            </ul>
                        </li>
                    </ul>
                </li>
            </ul>
        </aside>

        <div class="w-1.5 cursor-col-resize hover:bg-indigo-500 active:bg-indigo-600 border-r border-gray-200 transition-colors shrink-0 flex items-center justify-center"
             x-show="sidebarOpen"
             @mousedown="isResizing = true"
             :class="isResizing ? 'bg-indigo-500' : 'bg-transparent'">
            <div class="w-0.5 h-4 bg-gray-300 rounded-sm"></div>
        </div>

        <main class="flex-1 bg-white p-8 lg:px-12">
            <article class="prose max-w-3xl">
                <h1 class="text-3xl font-bold tracking-tight text-gray-900 pb-4 border-b border-gray-200 mb-6">사용자 관리</h1>
                <p class="text-gray-600 leading-relaxed mb-4">
                    왼쪽 폴더 영역 오른쪽 경계선(스플리터 바)에 마우스를 올리면 커서가 크기 조절 모양(<code class="bg-gray-100 text-xs px-1 py-0.5 font-mono">col-resize</code>)으로 바뀝니다. 클릭 후 드래그하여 최소 180px에서 최대 500px까지 너비를 조절해 보세요.
                </p>
            </article>
        </main>

        <aside class="w-48 p-6 shrink-0 hidden lg:block border-l border-gray-100 bg-white"
               x-show="tocOpen" x-cloak>
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">이 페이지의 목차</p>
            <ul class="space-y-2 text-xs text-gray-500 border-l-2 border-gray-200 pl-3">
                <li><a href="#" class="block text-indigo-600 font-medium">1. 주요 기능 안내</a></li>
            </ul>
        </aside>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
