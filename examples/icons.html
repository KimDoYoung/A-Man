
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Font Awesome 고급 뷰어</title>
    <script src="all.js"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* 상단 고정 바 (검색) */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-color);
            padding: 10px 0 20px 0;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: block;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid var(--primary-color);
            font-size: 18px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* 아이콘 그리드 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #eee;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        /* 아이콘 크기 확대 */
        .card i,
        .card svg {
            font-size: 48px !important;
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            color: #444;
        }

        .name {
            font-size: 13px;
            color: #777;
            font-weight: 500;
        }

        /* 섹션 타이틀 */
        h2 {
            margin-top: 50px;
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
        }

        /* 알림 팝업 (토스트) */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>

    <div class="header">
        <input type="text" id="searchInput" class="search-box" placeholder="아이콘 이름을 입력하여 검색... (예: user, heart, home)">
    </div>

    <div id="status" style="text-align: center; font-weight: bold; color: var(--primary-color);">데이터 로드 중...</div>
    <div id="container"></div>

    <div id="toast">코드가 복사되었습니다!</div>

    <script>
        let iconData = [];

        window.onload = function () {
            const fa = window.___FONT_AWESOME___;
            const container = document.getElementById('container');
            const status = document.getElementById('status');
            const searchInput = document.getElementById('searchInput');

            if (!fa || !fa.styles) {
                status.innerHTML = "all.js를 불러오지 못했습니다.";
                return;
            }

            // 1. 데이터 파싱 및 초기 렌더링
            for (const prefix in fa.styles) {
                const section = document.createElement('div');
                section.id = `section-${prefix}`;
                section.innerHTML = `<h2>Style: ${prefix}</h2>`;

                const grid = document.createElement('div');
                grid.className = 'grid';
                grid.id = `grid-${prefix}`;

                for (const name in fa.styles[prefix]) {
                    const item = { prefix, name };
                    iconData.push(item);

                    const card = createCard(prefix, name);
                    grid.appendChild(card);
                }
                section.appendChild(grid);
                container.appendChild(section);
            }

            status.innerText = `총 ${iconData.length}개의 아이콘이 준비되었습니다.`;

            // 2. 검색 기능 구현
            searchInput.addEventListener('input', function (e) {
                const query = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.card');

                cards.forEach(card => {
                    const name = card.getAttribute('data-name');
                    if (name.includes(query)) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });

                // 검색 중에는 섹션 타이틀 숨기기 처리
                document.querySelectorAll('h2').forEach(h2 => {
                    h2.style.display = query ? 'none' : 'block';
                });
            });
        };

        function createCard(prefix, name) {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-name', name);
            card.innerHTML = `
            <i class="${prefix} fa-${name}"></i>
            <div class="name">${name}</div>
        `;

            // 클릭 시 사용법 복사 기능
            card.onclick = function () {
                const code = `<i class="${prefix} fa-${name}"></i>`;
                copyToClipboard(code);
            };

            return card;
        }

        function copyToClipboard(text) {
            const temp = document.createElement('textarea');
            document.body.appendChild(temp);
            temp.value = text;
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);

            // 토스트 알림 표시
            const toast = document.getElementById('toast');
            toast.innerText = `복사됨: ${text}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>

</body>

</html>
