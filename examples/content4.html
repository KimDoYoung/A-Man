<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetERP 어드민 가이드 문서 관리 시스템 (더블 스플리터)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #e2e8f0; border-radius: 2px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased select-none h-screen flex flex-col"
      x-data="{ 
          sidebarOpen: true, 
          previewOpen: true,
          sidebarWidth: 260,
          previewWidthPercent: 50,
          resizingSidebar: false,
          resizingPreview: false,
          selectedPageTitle: '1.1.1 사용자 관리',
          selectedPageContent: '## 사용자 관리 가이드\n\n이곳은 Tiptap을 시뮬레이션한 편집 영역입니다.\n\n- 이제 두 개의 스플리터 바를 드래그하여 전체 레이아웃 너비를 자유롭게 조절할 수 있습니다.\n- 1번 바: 메뉴와 콘텐츠 영역 사이 크기 조절\n- 2번 바: 편집기와 라이브 프리뷰 사이 크기 조절',
          previewContent: '## 사용자 관리 가이드\n\n이곳은 Tiptap을 시뮬레이션한 편집 영역입니다.\n\n- 이제 두 개의 스플리터 바를 드래그하여 전체 레이아웃 너비를 자유롭게 조절할 수 있습니다.\n- 1번 바: 메뉴와 콘텐츠 영역 사이 크기 조절\n- 2번 바: 편집기와 라이브 프리뷰 사이 크기 조절',
          expandedFolders: { '1': true, '1.1': true },
          contextMenu: { open: false, x: 0, y: 0, targetId: null }
      }"
      @mousemove.window="
        if (resizingSidebar) {
            sidebarWidth = Math.max(180, Math.min($event.clientX, 400));
        }
        if (resizingPreview) {
            let container = $refs.workspaceContainer;
            if (container) {
                let rect = container.getBoundingClientRect();
                let relativeX = $event.clientX - rect.left;
                let percent = (relativeX / rect.width) * 100;
                previewWidthPercent = Math.max(20, Math.min(percent, 80));
            }
        }
      "
      @mouseup.window="resizingSidebar = false; resizingPreview = false;"
      @click="contextMenu.open = false"
      @contextmenu="contextMenu.open = false">

    <header class="h-14 bg-gray-900 text-white px-6 flex items-center justify-between border-b border-gray-800 shrink-0">
        <div class="flex items-center space-x-3">
            <button @click="sidebarOpen = !sidebarOpen" class="p-1.5 rounded-md hover:bg-gray-800 text-gray-400 transition-colors cursor-pointer" title="메뉴 영역 토글">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center space-x-2">
                <span class="text-sm font-semibold tracking-wider px-2 py-0.5 bg-indigo-600 rounded text-indigo-50">A-Man version</span>
                <span class="text-xs text-amber-400 font-mono">| Double Splitter Mode</span>
            </div>
        </div>
        <div class="flex items-center space-x-4 text-sm">
            <div class="flex items-center space-x-1.5 text-gray-300">
                <i data-lucide="user-check" class="w-4 h-4 text-emerald-400"></i>
                <span class="font-medium">최고관리자 (admin)</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden items-stretch">
        
        <aside class="bg-white p-4 flex flex-col shrink-0 overflow-hidden"
               x-show="sidebarOpen" x-cloak :style="'width: ' + sidebarWidth + 'px;'">
            <div class="mb-3 sticky top-0 bg-white pb-2 border-b border-gray-100">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">메뉴 네비게이션</p>
                <div class="flex items-center space-x-1.5">
                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-2.5 pointer-events-none text-gray-400">
                            <i data-lucide="filter" class="w-3.5 h-3.5"></i>
                        </span>
                        <input type="text" placeholder="메뉴 필터링..." class="w-full pl-8 pr-3 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded-md focus:outline-hidden">
                    </div>
                </div>
            </div>
            
            <ul class="space-y-2.5 overflow-y-auto flex-1 text-xs text-gray-700 whitespace-nowrap custom-scroll pr-1">
                <li>
                    <div @click="expandedFolders['1'] = !expandedFolders['1']" @contextmenu.prevent="contextMenu.open = true; contextMenu.x = $event.clientX; contextMenu.y = $event.clientY; contextMenu.targetId = 'sys_folder';" class="flex items-center justify-between p-1 rounded-sm hover:bg-gray-50 cursor-pointer font-semibold text-gray-900">
                        <div class="flex items-center"><i data-lucide="folder" class="w-3.5 h-3.5 mr-1.5 text-indigo-500"></i><span>1. 시스템 설정</span></div>
                        <i data-lucide="chevron-down" class="w-3 h-3 text-gray-400 transition-transform" :class="expandedFolders['1'] ? '' : '-rotate-90'"></i>
                    </div>
                    <ul class="mt-1 ml-3 border-l border-gray-100 pl-2.5 space-y-2" x-show="expandedFolders['1']">
                        <li>
                            <button @click="selectedPageTitle = '1.1.1 사용자 관리'" class="w-full text-left py-1 px-2 rounded-sm bg-indigo-50 text-indigo-700 font-medium">1.1.1 사용자 관리</button>
                        </li>
                    </ul>
                </li>
            </ul>
        </aside>

        <div class="w-1.5 cursor-col-resize hover:bg-indigo-500 border-r border-gray-200 transition-colors shrink-0 flex items-center justify-center z-20"
             x-show="sidebarOpen"
             @mousedown="resizingSidebar = true"
             :class="resizingSidebar ? 'bg-indigo-500' : 'bg-transparent'">
            <div class="w-0.5 h-4 bg-gray-300 rounded-sm"></div>
        </div>

        <main class="flex-1 bg-white p-6 flex flex-col overflow-hidden">
            
            <nav class="flex items-center space-x-2 text-[11px] text-gray-400 font-medium mb-2.5 select-none shrink-0">
                <span class="hover:text-gray-600 cursor-pointer">시스템 설정</span>
                <i data-lucide="chevron-right" class="w-3 h-3 text-gray-300"></i>
                <span class="text-indigo-600 font-semibold" x-text="selectedPageTitle"></span>
            </nav>

            <div class="mb-4 shrink-0 flex items-center justify-between">
                <h1 class="text-xl font-bold text-gray-900" x-text="selectedPageTitle"></h1>
            </div>

            <div x-ref="workspaceContainer" class="flex-1 flex border border-gray-200 rounded-lg overflow-hidden bg-gray-100 items-stretch relative">
                
                <div class="bg-white flex flex-col border-r border-gray-200"
                     :style="previewOpen ? 'width: ' + previewWidthPercent + '%;' : 'width: 100%;'">
                    
                    <div class="bg-gray-50 border-b border-gray-200 px-4 py-2 flex items-center justify-between text-gray-500 shrink-0 select-none">
                        <div class="flex items-center space-x-2">
                            <button class="p-1 hover:bg-gray-200 rounded text-gray-800 font-bold text-xs px-1">H1</button>
                            <button class="p-1 hover:bg-gray-200 rounded text-gray-800 font-bold text-xs px-1">H2</button>
                        </div>
                        
                        <button @click="previewOpen = !previewOpen" 
                                class="px-2.5 py-1 bg-white hover:bg-gray-100 border border-gray-200 rounded text-xs font-medium text-gray-600 flex items-center space-x-1 cursor-pointer"
                                :title="previewOpen ? '미리보기 숨기기' : '미리보기 보이기'">
                            <i :data-lucide="previewOpen ? 'eye-off' : 'eye'" class="w-3.5 h-3.5"></i>
                            <span x-text="previewOpen ? '미리보기 숨기기' : '미리보기 보이기'"></span>
                        </button>
                    </div>
                    
                    <textarea class="flex-1 p-4 font-mono text-xs resize-none focus:outline-hidden leading-relaxed bg-white custom-scroll" 
                              x-model="selectedPageContent"
                              @input="previewContent = selectedPageContent"
                              placeholder="마크다운 문서를 편집하세요..."></textarea>
                </div>

                <div class="w-1.5 cursor-col-resize hover:bg-indigo-500 border-r border-gray-200 transition-colors shrink-0 flex items-center justify-center z-20"
                     x-show="previewOpen"
                     @mousedown="resizingPreview = true"
                     :class="resizingPreview ? 'bg-indigo-500' : 'bg-transparent'">
                    <div class="w-0.5 h-4 bg-gray-300 rounded-sm"></div>
                </div>

                <div class="bg-slate-50 flex flex-col flex-1" x-show="previewOpen" x-cloak>
                    <div class="bg-slate-100 border-b border-gray-200 px-4 py-2 flex items-center justify-between text-gray-500 shrink-0 select-none">
                        <span class="text-[10px] font-mono text-indigo-600 bg-indigo-50 border border-indigo-100 px-1.5 py-0.5 rounded font-bold tracking-wider">LIVE PREVIEW</span>
                    </div>
                    <div class="flex-1 p-5 overflow-y-auto custom-scroll bg-slate-50/50">
                        <div class="prose max-w-none bg-white p-5 border border-gray-100 rounded-md shadow-xs font-mono text-xs whitespace-pre-wrap leading-relaxed min-h-full" 
                             x-text="previewContent"></div>
                    </div>
                </div>

            </div>

            <div class="mt-3 flex justify-end shrink-0 select-none">
                <button @click="previewContent = selectedPageContent; alert('변경사항 저장이 완료되었습니다.');" 
                        class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md text-xs font-semibold shadow-xs flex items-center space-x-1.5 cursor-pointer">
                    <i data-lucide="save" class="w-3.5 h-3.5"></i>
                    <span>변경사항 저장하기 (Upsert)</span>
                </button>
            </div>
        </main>
    </div>

    <div x-show="contextMenu.open" x-cloak x-transition.opacity class="absolute z-[100] w-40 bg-white border border-gray-200 rounded-lg shadow-xl py-1 text-xs text-gray-700 font-medium select-none" :style="'left: ' + contextMenu.x + 'px; top: ' + contextMenu.y + 'px;'">
        <button @click="alert('아래에 메뉴를 추가합니다.');" class="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center space-x-2 cursor-pointer"><i data-lucide="chevron-down-square" class="w-3.5 h-3.5 text-gray-400"></i><span>아래에 메뉴 추가</span></button>
        <button @click="alert('위에 메뉴를 추가합니다.');" class="w-full text-left px-3 py-1.5 hover:bg-gray-50 flex items-center space-x-2 cursor-pointer"><i data-lucide="chevron-up-square" class="w-3.5 h-3.5 text-gray-400"></i><span>위에 메뉴 추가</span></button>
    </div>

    <script>
        lucide.createIcons();
        document.addEventListener('alpine:init', () => {
            Alpine.effect(() => {
                setTimeout(() => lucide.createIcons(), 5);
            });
        });
    </script>
</body>
</html>
