aman.base-dir=/data/docker/apps/aman
aman.log-dir=${aman.base-dir}/logs
aman.db-dir=${aman.base-dir}/db
aman.data-dir=${aman.base-dir}/data
aman.image-dir=${aman.data-dir}/images
aman.db-name=${aman.db-dir}/aman.db

# SQLite 데이터소스 설정
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:${aman.db-name}
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate 설정
spring.jpa.database-platform=org.sqlite.hibernate.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 로그 레벨 설정 (운영 및 디버깅용)
logging.level.root=INFO
logging.level.kr.co.kfs.aman=DEBUG

# JWT 토큰 만료 시간 설정 (단위: 밀리초)
# Access Token: 1시간 (3600000ms), Refresh Token: 14일 (1209600000ms)
spring.security.jwt.access-expiration=3600000
spring.security.jwt.refresh-expiration=1209600000