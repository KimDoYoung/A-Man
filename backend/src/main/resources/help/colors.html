<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/aman/favicon.png">
    <title>AssetERP 도움말 색상 팔레트</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        p.subtitle {
            color: #475569;
            font-size: 0.95rem;
        }
        h2 {
            margin-top: 40px;
            font-size: 1.4rem;
            color: #1e3a8a;
            border-left: 5px solid #3b82f6;
            padding-left: 15px;
            margin-bottom: 20px;
        }
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }
        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
            background-color: #ffffff;
            color: #0f172a;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            text-align: center;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s, background-color 0.2s;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 180px;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
            background-color: #f8fafc;
        }
        .color-preview {
            width: 100%;
            height: 60px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            margin-bottom: 12px;
        }
        .card-name {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.8rem;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            width: 100%;
            margin-bottom: 4px;
            box-sizing: border-box;
            font-weight: bold;
        }
        .card-hex {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 10px;
        }
        .card-actions {
            display: flex;
            gap: 6px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-copy {
            flex: 1;
            padding: 6px 2px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            background-color: #ffffff;
            color: #475569;
            cursor: pointer;
            transition: background-color 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
            outline: none;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .btn-copy:hover {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: #ffffff;
        }
        .btn-copy:active {
            transform: scale(0.95);
        }
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #0f172a;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .no-results {
            text-align: center;
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 40px;
            grid-column: 1 / -1;
            display: none;
        }
        #status {
            text-align: center;
            font-weight: 600;
            color: #3b82f6;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎨 AssetERP 도움말 색상 팔레트</h1>
        <p class="subtitle">색상 이름을 복사하여 <code>`색상:아이콘:텍스트`</code> 등의 백틱 서식에 사용하거나 Hex 코드를 직접 가져가세요.</p>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="색상 이름 또는 Hex 코드로 검색하세요..." autocomplete="off">
    </div>

    <div id="status">색상 데이터를 준비하는 중...</div>

    <div id="colorContainer"></div>
    <div class="no-results" id="noResults">검색 결과가 없습니다.</div>
</div>

<div class="toast" id="toast">
    <span id="toastText">복사되었습니다.</span>
</div>

<script>
    const colorData = [
        // 1. AssetERP 핵심 테마 색상
        { group: 'AssetERP 핵심 색상', name: 'blue', hex: '456EA6' },
        { group: 'AssetERP 핵심 색상', name: 'mint', hex: '17A2B8' },
        { group: 'AssetERP 핵심 색상', name: 'red', hex: 'DD5E5E' },
        { group: 'AssetERP 핵심 색상', name: 'orange', hex: 'E89646' },
        { group: 'AssetERP 핵심 색상', name: 'darkGray', hex: '646362' },
        { group: 'AssetERP 핵심 색상', name: 'lightBlue', hex: '6AB6CF' },
        { group: 'AssetERP 핵심 색상', name: 'green', hex: '2EAC7E' },
        { group: 'AssetERP 핵심 색상', name: 'dark', hex: '343A40' },
        { group: 'AssetERP 핵심 색상', name: 'paleBlue', hex: 'EEF2FC' },
        { group: 'AssetERP 핵심 색상', name: 'gray', hex: '6B6B6B' },

        // 2. 범용 파스텔/Tailwind 컬러 팩
        { group: 'Slate (슬레이트 회색)', name: 'slate-100', hex: 'F1F5F9' },
        { group: 'Slate (슬레이트 회색)', name: 'slate-300', hex: 'CBD5E1' },
        { group: 'Slate (슬레이트 회색)', name: 'slate-500', hex: '64748B' },
        { group: 'Slate (슬레이트 회색)', name: 'slate-700', hex: '334155' },
        { group: 'Slate (슬레이트 회색)', name: 'slate-900', hex: '0F172A' },

        { group: 'Red (빨간색 계열)', name: 'red-100', hex: 'FEE2E2' },
        { group: 'Red (빨간색 계열)', name: 'red-300', hex: 'FCA5A5' },
        { group: 'Red (빨간색 계열)', name: 'red-500', hex: 'EF4444' },
        { group: 'Red (빨간색 계열)', name: 'red-700', hex: 'B91C1C' },

        { group: 'Orange (주황색 계열)', name: 'orange-100', hex: 'FFEDD5' },
        { group: 'Orange (주황색 계열)', name: 'orange-300', hex: 'FDBA74' },
        { group: 'Orange (주황색 계열)', name: 'orange-500', hex: 'F97316' },
        { group: 'Orange (주황색 계열)', name: 'orange-700', hex: 'C2410C' },

        { group: 'Amber (황색 계열)', name: 'amber-100', hex: 'FEF3C7' },
        { group: 'Amber (황색 계열)', name: 'amber-300', hex: 'FCD34D' },
        { group: 'Amber (황색 계열)', name: 'amber-500', hex: 'F59E0B' },
        { group: 'Amber (황색 계열)', name: 'amber-700', hex: 'B45309' },

        { group: 'Emerald (에메랄드 초록)', name: 'emerald-100', hex: 'D1FAE5' },
        { group: 'Emerald (에메랄드 초록)', name: 'emerald-300', hex: '6EE7B7' },
        { group: 'Emerald (에메랄드 초록)', name: 'emerald-500', hex: '10B981' },
        { group: 'Emerald (에메랄드 초록)', name: 'emerald-700', hex: '047857' },

        { group: 'Blue (파란색 계열)', name: 'blue-100', hex: 'DBEAFE' },
        { group: 'Blue (파란색 계열)', name: 'blue-300', hex: '93C5FD' },
        { group: 'Blue (파란색 계열)', name: 'blue-500', hex: '3B82F6' },
        { group: 'Blue (파란색 계열)', name: 'blue-700', hex: '1D4ED8' },
        { group: 'Blue (파란색 계열)', name: 'blue-900', hex: '1E3A8A' },

        { group: 'Indigo (인디고 블루)', name: 'indigo-100', hex: 'E0E7FF' },
        { group: 'Indigo (인디고 블루)', name: 'indigo-300', hex: 'A5B4FC' },
        { group: 'Indigo (인디고 블루)', name: 'indigo-500', hex: '6366F1' },
        { group: 'Indigo (인디고 블루)', name: 'indigo-700', hex: '4338CA' },

        { group: 'Violet (바이올렛 보라)', name: 'violet-100', hex: 'EDE9FE' },
        { group: 'Violet (바이올렛 보라)', name: 'violet-300', hex: 'C4B5FD' },
        { group: 'Violet (바이올렛 보라)', name: 'violet-500', hex: '8B5CF6' },
        { group: 'Violet (바이올렛 보라)', name: 'violet-700', hex: '6D28D9' },

        { group: 'Rose (로즈 핑크)', name: 'rose-100', hex: 'FFE4E6' },
        { group: 'Rose (로즈 핑크)', name: 'rose-300', hex: 'FDA4AF' },
        { group: 'Rose (로즈 핑크)', name: 'rose-500', hex: 'F43F5E' },
        { group: 'Rose (로즈 핑크)', name: 'rose-700', hex: 'BE123C' },

        { group: '기타 기본 웹 컬러', name: 'black', hex: '000000' },
        { group: '기타 기본 웹 컬러', name: 'white', hex: 'FFFFFF' },
        { group: '기타 기본 웹 컬러', name: 'transparent', hex: 'FFFFFF' }
    ];

    window.onload = function () {
        const container = document.getElementById('colorContainer');
        const status = document.getElementById('status');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');

        // 그룹별로 섹션을 분할하여 렌더링
        const groups = {};
        colorData.forEach(item => {
            if (!groups[item.group]) {
                groups[item.group] = [];
            }
            groups[item.group].push(item);
        });

        for (const groupName in groups) {
            if (groups.hasOwnProperty(groupName)) {
                const section = document.createElement('div');
                section.className = 'section-group';
                section.innerHTML = `<h2>${groupName}</h2>`;

                const grid = document.createElement('div');
                grid.className = 'grid';

                groups[groupName].forEach(color => {
                    const card = createColorCard(color);
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        status.innerText = `총 ${colorData.length}개의 색상 팔레트가 준비되었습니다.`;

        // 검색 기능
        searchInput.addEventListener('input', function (e) {
            const query = e.target.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');
            let hasVisibleCard = false;

            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                const hex = card.getAttribute('data-hex');
                if (name.includes(query) || hex.includes(query)) {
                    card.style.display = 'flex';
                    hasVisibleCard = true;
                } else {
                    card.style.display = 'none';
                }
            });

            document.querySelectorAll('.section-group h2').forEach(h2 => {
                h2.style.display = query ? 'none' : 'block';
            });

            if (query && !hasVisibleCard) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
            }
        });
    };

    function createColorCard(color) {
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('data-name', color.name.toLowerCase());
        card.setAttribute('data-hex', color.hex.toLowerCase());

        // 투명 또는 화이트 컬러 테두리 명시 처리
        const borderStyle = color.name === 'white' || color.name === 'transparent' ? 'border: 1px solid #cbd5e1;' : '';
        const bgVal = color.name === 'transparent' ? 'transparent' : `#${color.hex}`;

        card.innerHTML = `
            <div class="color-preview" style="background-color: ${bgVal}; ${borderStyle}"></div>
            <div class="card-name">${color.name}</div>
            <div class="card-hex">#${color.hex}</div>
            <div class="card-actions">
                <button class="btn-copy btn-copy-name">이름 복사</button>
                <button class="btn-copy btn-copy-hex">Hex 복사</button>
            </div>
        `;

        const btnName = card.querySelector('.btn-copy-name');
        const btnHex = card.querySelector('.btn-copy-hex');

        btnName.onclick = function (e) {
            e.stopPropagation();
            copyToClipboard(color.name);
        };

        btnHex.onclick = function (e) {
            e.stopPropagation();
            copyToClipboard(color.hex);
        };

        return card;
    }

    function copyToClipboard(text) {
        const temp = document.createElement('textarea');
        document.body.appendChild(temp);
        temp.value = text;
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);

        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');
        toastText.innerText = `복사됨: ${text}`;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 2000);
    }
</script>
</body>
</html>
