<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/aman/favicon.png">
    <title>FontAwesome 5 아이콘 검색기</title>
    <script src="all.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            padding: 30px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        h1 i, h1 svg {
            width: 2.2rem;
            height: 2.2rem;
            color: #1e3a8a;
            display: inline-block;
        }
        p.subtitle {
            color: #475569;
            font-size: 0.95rem;
        }
        h2 {
            margin-top: 40px;
            font-size: 1.5rem;
            color: #1e3a8a;
            border-left: 5px solid #3b82f6;
            padding-left: 15px;
            margin-bottom: 20px;
        }
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }
        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
            background-color: #ffffff;
            color: #0f172a;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .search-box i, .search-box svg {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
            width: 1.1rem;
            height: 1.1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s, background-color 0.2s;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 180px;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
            background-color: #f8fafc;
        }
        .card i, .card svg {
            font-size: 2.2rem;
            width: 2.2rem;
            height: 2.2rem;
            color: #475569;
            margin-bottom: 12px;
            display: inline-block;
            transition: color 0.2s;
        }
        .card:hover i, .card:hover svg {
            color: #3b82f6;
        }
        .card-name {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.8rem;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            width: 100%;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        .card-actions {
            display: flex;
            gap: 6px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-copy {
            flex: 1;
            padding: 6px 4px;
            font-size: 0.72rem;
            font-weight: 600;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            background-color: #ffffff;
            color: #475569;
            cursor: pointer;
            transition: background-color 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
            outline: none;
            box-sizing: border-box;
            white-space: nowrap;
        }
        .btn-copy:hover {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: #ffffff;
        }
        .btn-copy:active {
            transform: scale(0.95);
        }
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #0f172a;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast i, .toast svg {
            width: 1.2rem;
            height: 1.2rem;
            color: #10b981;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .no-results {
            text-align: center;
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 40px;
            grid-column: 1 / -1;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fas fa-icons"></i> FontAwesome 5 아이콘 검색기</h1>
        <p class="subtitle">아이콘을 클릭하면 마크다운 백틱에 사용할 명칭이 클립보드에 자동 복사됩니다.</p>
    </header>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="검색할 아이콘 이름을 입력하세요..." autocomplete="off">
    </div>

    <div id="status" style="text-align: center; font-weight: 600; color: #3b82f6; margin-bottom: 20px;">아이콘 데이터를 분석하는 중...</div>

    <div id="iconContainer"></div>
    <div class="no-results" id="noResults">검색 결과가 없습니다.</div>
</div>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastText">복사되었습니다.</span>
</div>

<script>
    window.onload = function () {
        const fa = window.___FONT_AWESOME___;
        const container = document.getElementById('iconContainer');
        const status = document.getElementById('status');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');

        if (!fa || !fa.styles) {
            status.innerHTML = "all.js를 불러오지 못했습니다.";
            return;
        }

        let totalIcons = 0;

        // 1. 데이터 파싱 및 초기 렌더링
        for (const prefix in fa.styles) {
            if (fa.styles.hasOwnProperty(prefix)) {
                const section = document.createElement('div');
                section.id = `section-${prefix}`;
                section.className = 'section-group';
                section.innerHTML = `<h2>Style: ${prefix}</h2>`;

                const grid = document.createElement('div');
                grid.className = 'grid';
                grid.id = `grid-${prefix}`;

                for (const name in fa.styles[prefix]) {
                    if (fa.styles[prefix].hasOwnProperty(name)) {
                        totalIcons++;
                        const card = createCard(prefix, name);
                        grid.appendChild(card);
                    }
                }
                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        status.innerText = `총 ${totalIcons}개의 아이콘이 준비되었습니다.`;

        // 2. 검색 기능 구현
        searchInput.addEventListener('input', function (e) {
            const query = e.target.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');
            let hasVisibleCard = false;

            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                if (name.includes(query)) {
                    card.style.display = 'block';
                    hasVisibleCard = true;
                } else {
                    card.style.display = 'none';
                }
            });

            // 검색 중에는 섹션 타이틀 숨기기 처리
            document.querySelectorAll('.section-group h2').forEach(h2 => {
                h2.style.display = query ? 'none' : 'block';
            });

            // 검색 결과 없음 문구 처리
            if (query && !hasVisibleCard) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
            }
        });
    };

    function createCard(prefix, name) {
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('data-name', name);
        card.innerHTML = `
            <i class="${prefix} fa-${name}"></i>
            <div class="card-name">${name}</div>
            <div class="card-actions">
                <button class="btn-copy btn-copy-tag">태그 복사</button>
                <button class="btn-copy btn-copy-name">이름 복사</button>
            </div>
        `;

        const btnTag = card.querySelector('.btn-copy-tag');
        const btnName = card.querySelector('.btn-copy-name');

        btnTag.onclick = function (e) {
            e.stopPropagation();
            const tagStr = `<i class="${prefix} fa-${name}"></i>`;
            copyToClipboard(tagStr);
        };

        btnName.onclick = function (e) {
            e.stopPropagation();
            const classStr = `${prefix} fa-${name}`;
            copyToClipboard(classStr);
        };

        return card;
    }

    function copyToClipboard(text) {
        const temp = document.createElement('textarea');
        document.body.appendChild(temp);
        temp.value = text;
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);

        // 토스트 알림 표시
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');
        toastText.innerText = `복사됨: ${text}`;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 2000);
    }
</script>
</body>
</html>
