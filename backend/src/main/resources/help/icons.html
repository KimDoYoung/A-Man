<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/aman/favicon.png">
    <title>FontAwesome 5 아이콘 검색기</title>
    <script src="./all.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            padding: 30px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        h1 i, h1 svg {
            width: 2.2rem;
            height: 2.2rem;
            color: #1e3a8a;
            display: inline-block;
        }
        p.subtitle {
            color: #475569;
            font-size: 0.95rem;
        }
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }
        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border-radius: 8px;
            border: 2px solid #cbd5e1;
            background-color: #ffffff;
            color: #0f172a;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .search-box i, .search-box svg {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
            width: 1.1rem;
            height: 1.1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, background-color 0.2s;
            user-select: none;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: #3b82f6;
            background-color: #f8fafc;
        }
        .card:active {
            transform: scale(0.98);
        }
        .card i, .card svg {
            font-size: 2.2rem;
            width: 2.2rem;
            height: 2.2rem;
            color: #475569;
            margin-bottom: 12px;
            display: inline-block;
            transition: color 0.2s;
        }
        .card:hover i, .card:hover svg {
            color: #3b82f6;
        }
        .card-name {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.85rem;
            color: #334155;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
        }
        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #0f172a;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast i, .toast svg {
            width: 1.2rem;
            height: 1.2rem;
            color: #10b981;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .no-results {
            text-align: center;
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 40px;
            grid-column: 1 / -1;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fas fa-icons"></i> FontAwesome 5 아이콘 검색기</h1>
        <p class="subtitle">아이콘을 클릭하면 마크다운 백틱에 사용할 명칭이 클립보드에 자동 복사됩니다.</p>
    </header>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="검색할 아이콘 이름을 입력하세요..." autocomplete="off">
    </div>

    <div class="grid" id="iconGrid">
        <div class="no-results" id="noResults">검색 결과가 없습니다.</div>
    </div>
</div>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastText">복사되었습니다.</span>
</div>

<script>
    // 로컬 all.js 로드 실패 시 Fallback 기본 아이콘 리스트
    const fallbackIcons = [
        { name: 'search', class: 'fas fa-search' },
        { name: 'plus', class: 'fas fa-plus' },
        { name: 'minus', class: 'fas fa-minus' },
        { name: 'check', class: 'fas fa-check' },
        { name: 'times', class: 'fas fa-times' },
        { name: 'trash', class: 'fas fa-trash' },
        { name: 'ban', class: 'fas fa-ban' },
        { name: 'cog', class: 'fas fa-cog' },
        { name: 'cogs', class: 'fas fa-cogs' },
        { name: 'edit', class: 'fas fa-edit' },
        { name: 'pen', class: 'fas fa-pen' },
        { name: 'copy', class: 'fas fa-copy' },
        { name: 'paste', class: 'fas fa-paste' },
        { name: 'link', class: 'fas fa-link' },
        { name: 'info-circle', class: 'fas fa-info-circle' },
        { name: 'question-circle', class: 'fas fa-question-circle' },
        { name: 'exclamation-circle', class: 'fas fa-exclamation-circle' },
        { name: 'check-circle', class: 'fas fa-check-circle' },
        { name: 'calendar-alt', class: 'fas fa-calendar-alt' },
        { name: 'clock', class: 'fas fa-clock' },
        { name: 'file-alt', class: 'fas fa-file-alt' },
        { name: 'folder-open', class: 'fas fa-folder-open' },
        { name: 'user', class: 'fas fa-user' },
        { name: 'users', class: 'fas fa-users' },
        { name: 'database', class: 'fas fa-database' },
        { name: 'won-sign', class: 'fas fa-won-sign' },
        { name: 'home', class: 'fas fa-home' },
        { name: 'arrow-right', class: 'fas fa-arrow-right' },
        { name: 'chevron-down', class: 'fas fa-chevron-down' }
    ];

    const grid = document.getElementById('iconGrid');
    const search = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toastText');
    let toastTimeout;
    let activeIcons = [];

    // FontAwesome 전역 객체로부터 동적 추출
    function loadIconsFromFontAwesome() {
        const list = [];
        try {
            const fa = window.___FONT_AWESOME___;
            if (fa && fa.styles) {
                // styles 예: { fas: { search: [...] }, fab: { github: [...] } }
                for (const prefix in fa.styles) {
                    if (fa.styles.hasOwnProperty(prefix)) {
                        const iconsOfPrefix = fa.styles[prefix];
                        for (const name in iconsOfPrefix) {
                            if (iconsOfPrefix.hasOwnProperty(name)) {
                                list.push({
                                    name: name,
                                    class: `${prefix} fa-${name}`
                                });
                            }
                        }
                    }
                }
            }
        } catch (e) {
            console.error("FontAwesome 객체 파싱 오류:", e);
        }
        
        if (list.length === 0) {
            console.info("FontAwesome 객체 파싱 실패 또는 미로드로 Fallback 아이콘 리스트를 사용합니다.");
            return fallbackIcons;
        }

        console.info(`${list.length}개의 아이콘을 성공적으로 파싱했습니다.`);
        return list.sort((a, b) => a.name.localeCompare(b.name));
    }

    function renderIcons(list) {
        // Clear previous cards (keeping the noResults div)
        const cards = grid.querySelectorAll('.card');
        cards.forEach(c => c.remove());

        if (list.length === 0) {
            noResults.style.display = 'block';
            return;
        }
        noResults.style.display = 'none';

        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <i class="${item.class}"></i>
                <div class="card-name">${item.name}</div>
            `;
            card.onclick = () => copyText(item.name);
            grid.appendChild(card);
        });
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            toastText.textContent = `"${text}" 복사되었습니다.`;
            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        });
    }

    search.oninput = (e) => {
        const query = e.target.value.toLowerCase().trim();
        const filtered = activeIcons.filter(item => item.name.toLowerCase().includes(query));
        renderIcons(filtered);
    };

    // 로딩 문구 세팅 및 로드 시작
    noResults.textContent = "아이콘 목록을 불러오는 중...";
    noResults.style.display = 'block';

    const initLoad = () => {
        const list = loadIconsFromFontAwesome();
        activeIcons = list;
        noResults.textContent = "검색 결과가 없습니다.";
        renderIcons(activeIcons);
    };

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initLoad);
    } else {
        // all.js가 이미 실행되어 전역 객체가 활성화되었을 수 있으므로 약간의 지연 처리로 안전성 확보
        setTimeout(initLoad, 100);
    }
</script>
</body>
</html>
